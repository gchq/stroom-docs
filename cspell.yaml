ignorePaths:
- CHANGELOG.md
- CONTRIBUTING.md
- content/**/change-log.md
- ".git/**"
- assets/**
- static/**
- node_modules/**


ignoreRegExpList:
# Front matter
- '/^---(?:.|\n)*?^---/gm'

# Hugo shortcode blocks with markdown inner text
# We WANT to spell check these, e.g. note/warn blocks.
# e.g. {{% note %}}xxxx{{% /note %}}
#- '/{{%\s*([a-zA-Z_-]+)\s+[^%]*%}}(?:.|\n)*?{{\s*%\s*\/\s*\1\s+%}}/gm'
#
# Hugo shortcode blocks with markdown inner text
# We WANT to spell check the inner text
# e.g. {{% note %}}{% /note %}}
# e.g. {{% /pageinfo %}}
- '/{{%\s*(?:\/)?\s*\w+\s*%}}/g'

# Hugo shortcode blocks with raw inner text
# e.g. {{< command-line "user" "localhost" >}}xxxxxx{{</ command-line >}}
- '/{{<\s*([a-zA-Z_-]+)\s+[^>]*>}}(?:.|\n)*?{{<\s*\/\s*\1\s+>}}/gm'

# Hugo single shortcode
# e.g. {{< external-link "text_or_url" "url" >}}
- '/{{<\s*([a-zA-Z_-]+)\s+[^>]*>}}/gm'

# Inline code
# e.g. `xxxxx`
- '/(?<!`)`[^`]+?`/g'

# Fenced code block
# e.g. ```bash\necho\n```
- '/```.*\n(.|\n)+?```$/gm'

# Links
# e.g. (Foo)[http://foo]
- '/\[[^\]]+?\]\([^)]+?\)/g'

# URLs
- '/(?:https?|localhost):\/\/\S+/g'

- "\\$\\{[^}]+\\}"
# HTML comments
- "<!--[\\s\\S]*?-->"

# e.g. **X**xx, xx**X**, xx**X**xx
- '/(?:\w+\*\*\w+\**\w+|\*\*\w+\*\*\w+|\w+\*\*\w+\*\*)/g'

# Named anchors
# e.g. {#regex-maxmatch}
- '/{#[^}]+}/g'

# Single quoted text
# e.g. 'tabularize' 
- "'\w+'"

# HTML links, used for anchors in markdown
# e.g. <a name="mysqlclientinstall"></a>
- '/<a\s+(?:name|id)="[^"]+"\s*>.*<\/a>/gm'

# UPPER CASE only words
# e.g. RAID
- '/(?<=\W)[A-Z0-9]+(?=\W)/g'

